spring:
  application:
    name: zampanoreminder
  datasource:
    url: jdbc:h2:mem:zampanodb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

logging:
  level:
    zampano.ai.zampanoreminder: DEBUG
    org.hibernate.SQL: DEBUG
